name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh stats + Medium claps weekly (Mon 06:00 UTC). Weekly keeps the
    # RapidAPI Medium calls well within the free tier; use "Run workflow" to
    # refresh on demand any time.
    - cron: '0 6 * * 1'

# Allow the workflow to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a running deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch project stats
        run: node scripts/fetch-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Medium articles
        run: node scripts/fetch-medium.mjs
        env:
          # Optional: set this repo secret to show claps/comments. Without it,
          # articles still render (newest first) with no engagement numbers.
          RAPIDAPI_MEDIUM_KEY: ${{ secrets.RAPIDAPI_MEDIUM_KEY }}

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
