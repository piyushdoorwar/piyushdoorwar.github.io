name: Refresh impact stats

on:
  workflow_dispatch:
  schedule:
    # Every Sunday at 10:00 UTC.
    - cron: '0 10 * * 0'

permissions:
  contents: write

concurrency:
  group: impact-stats-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch aggregate impact statistics
        run: node scripts/fetch-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Persist refreshed impact statistics
        run: |
          if git diff --quiet -- src/data/stats.generated.json; then
            echo "Impact statistics are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/stats.generated.json
          git commit -m "chore(data): refresh impact stats"
          git push origin HEAD:main
