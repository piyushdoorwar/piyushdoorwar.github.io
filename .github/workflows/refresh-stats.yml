name: Refresh impact stats

on:
  workflow_dispatch:
  schedule:
    # Daily at 10:17 UTC. Avoid the top of the hour, when scheduled runs are busiest.
    - cron: '17 10 * * *'

permissions:
  contents: read

concurrency:
  group: impact-stats-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.persist.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch aggregate impact statistics
        run: node scripts/fetch-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Persist refreshed impact statistics
        id: persist
        run: |
          if git diff --quiet -- src/data/stats.generated.json; then
            echo "Impact statistics are already up to date."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/stats.generated.json
          git commit -m "chore(data): refresh impact stats"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: refresh
    if: needs.refresh.outputs.changed == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy.yml
