name: Refresh Medium data

on:
  workflow_dispatch:
  schedule:
    # 3rd of every month at 10:00 UTC.
    - cron: '0 10 3 * *'

permissions:
  contents: write

concurrency:
  group: medium-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Medium articles and engagement
        run: node scripts/fetch-medium.mjs
        env:
          RAPIDAPI_MEDIUM_KEY: ${{ secrets.RAPIDAPI_MEDIUM_KEY }}

      - name: Persist refreshed Medium data
        run: |
          if git diff --quiet -- src/data/medium.generated.json; then
            echo "Medium data is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/medium.generated.json
          git commit -m "chore(data): refresh Medium articles"
          git push origin HEAD:main
